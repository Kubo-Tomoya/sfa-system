<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>配属新規登録</title>
	<link rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
	<!-- ナビゲーションバー -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand" href="/students">SFAシステム</a>
			<div class="navbar-nav ms-auto">
				<a class="nav-link text-white" href="/students">生徒管理</a>
				<a class="nav-link text-white" href="/curriculums">カリキュラム管理</a>
				<a class="nav-link text-white" href="/fields">現場管理</a>
				<a class="nav-link text-white" href="/assignments">配属管理</a>
				<form th:action="@{/logout}" method="post" class="ms-2">
					<button type="submit" class="btn btn-outline-light btn-sm">
						ログアウト
					</button>
				</form>
			</div>
		</div>
	</nav>

	<div class="container mt-4">
		<h1 class="h3 mb-4">配属新規登録</h1>

		<form th:action="@{/assignments/create}" th:object="${assignmentForm}"
			method="post">
			<div class="row">
				<!-- 生徒 -->
				<div class="col-md-6 mb-3">
					<label class="form-label">生徒 <span class="text-danger">*</span></label>
					<select th:field="*{studentId}" class="form-select"
						th:classappend="${#fields.hasErrors('studentId')} ? 'is-invalid'">
						<option value="">選択してください</option>
						<option th:each="student : ${students}"
							th:value="${student.id}"
							th:text="${student.lastName + ' ' + student.firstName}">
						</option>
					</select>
					<div class="invalid-feedback" th:errors="*{studentId}"></div>
				</div>

				<!-- 現場 -->
				<div class="col-md-6 mb-3">
					<label class="form-label">現場 <span class="text-danger">*</span></label>
					<select th:field="*{fieldId}" class="form-select"
						th:classappend="${#fields.hasErrors('fieldId')} ? 'is-invalid'">
						<option value="">選択してください</option>
						<option th:each="field : ${fields}"
							th:value="${field.id}"
							th:text="${field.name}">
						</option>
					</select>
					<div class="invalid-feedback" th:errors="*{fieldId}"></div>
				</div>

				<!-- 役割 -->
				<div class="col-md-6 mb-3">
					<label class="form-label">役割</label>
					<input type="text" th:field="*{role}" class="form-control">
				</div>

				<!-- 配属区分 -->
				<div class="col-md-6 mb-3">
					<label class="form-label">配属区分 <span class="text-danger">*</span></label>
					<select th:field="*{assignmentType}" class="form-select"
						th:classappend="${#fields.hasErrors('assignmentType')} ? 'is-invalid'">
						<option value="">選択してください</option>
						<option value="1">実習</option>
						<option value="2">本番</option>
					</select>
					<div class="invalid-feedback" th:errors="*{assignmentType}"></div>
				</div>

				<!-- 開始日 -->
				<div class="col-md-6 mb-3">
					<label class="form-label">開始日 <span class="text-danger">*</span></label>
					<input type="date" th:field="*{startDate}" class="form-control"
						th:classappend="${#fields.hasErrors('startDate')} ? 'is-invalid'">
					<div class="invalid-feedback" th:errors="*{startDate}"></div>
				</div>

				<!-- 終了日 -->
				<div class="col-md-6 mb-3">
					<label class="form-label">終了日</label>
					<input type="date" th:field="*{endDate}" class="form-control">
				</div>

				<!-- 稼働時間 -->
				<div class="col-md-6 mb-3">
					<label class="form-label">稼働時間（月）</label>
					<input type="number" th:field="*{workingHours}" class="form-control">
				</div>

				<!-- 契約形態 -->
				<div class="col-md-6 mb-3">
					<label class="form-label">契約形態</label>
					<select th:field="*{contractType}" class="form-select">
						<option value="">選択してください</option>
						<option value="1">正社員</option>
						<option value="2">契約</option>
					</select>
				</div>
			</div>

			<div class="d-flex gap-2">
				<button type="submit" class="btn btn-primary">登録</button>
				<a href="/assignments" class="btn btn-secondary">戻る</a>
			</div>
		</form>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
	</script>
</body>
</html>
