<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>配属一覧</title>
	<link rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
	<!-- ナビゲーションバー -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand" href="/students">SFAシステム</a>
			<div class="navbar-nav ms-auto">
				<a class="nav-link text-white" href="/students">生徒管理</a>
				<a class="nav-link text-white" href="/curriculums">カリキュラム管理</a>
				<a class="nav-link text-white" href="/fields">現場管理</a>
				<a class="nav-link text-white" href="/assignments">配属管理</a>
				<form th:action="@{/logout}" method="post" class="ms-2">
					<button type="submit" class="btn btn-outline-light btn-sm">
						ログアウト
					</button>
				</form>
			</div>
		</div>
	</nav>

	<div class="container mt-4">
		<div class="d-flex justify-content-between align-items-center mb-3">
			<h1 class="h3">配属一覧</h1>
			<a href="/assignments/new" class="btn btn-primary">新規登録</a>
		</div>

		<table class="table table-hover table-bordered">
			<thead class="table-dark">
				<tr>
					<th>生徒名</th>
					<th>現場名</th>
					<th>役割</th>
					<th>配属区分</th>
					<th>開始日</th>
					<th>終了日</th>
					<th>契約形態</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="assignment : ${assignments}">
					<td th:text="${assignment.student.lastName + ' ' + assignment.student.firstName}"></td>
					<td th:text="${assignment.field.name}"></td>
					<td th:text="${assignment.role}"></td>
					<td>
						<span th:switch="${assignment.assignmentType}">
							<span th:case="1" class="badge bg-info">実習</span>
							<span th:case="2" class="badge bg-success">本番</span>
						</span>
					</td>
					<td th:text="${assignment.startDate}"></td>
					<td th:text="${assignment.endDate}"></td>
					<td>
						<span th:switch="${assignment.contractType}">
							<span th:case="1" class="badge bg-primary">正社員</span>
							<span th:case="2" class="badge bg-secondary">契約</span>
						</span>
					</td>
					<td>
						<a th:href="@{/assignments/{id}/edit(id=${assignment.id})}"
							class="btn btn-sm btn-warning">編集</a>
						<form th:action="@{/assignments/{id}/delete(id=${assignment.id})}"
							method="post" class="d-inline">
							<button type="submit" class="btn btn-sm btn-danger"
								onclick="return confirm('削除しますか？')">削除</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
	</script>
</body>
</html>
