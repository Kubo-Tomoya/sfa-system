<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>ホーム</title>
	<link rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
	<!-- ナビゲーションバー -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand" href="/home">SFAシステム</a>
			<div class="navbar-nav ms-auto">
				<a class="nav-link text-white" href="/students">生徒管理</a>
				<a class="nav-link text-white" href="/curriculums">カリキュラム管理</a>
				<a class="nav-link text-white" href="/fields">現場管理</a>
				<a class="nav-link text-white" href="/assignments">配属管理</a>
				<form th:action="@{/logout}" method="post" class="ms-2">
					<button type="submit" class="btn btn-outline-light btn-sm">
						ログアウト
					</button>
				</form>
			</div>
		</div>
	</nav>

	<div class="container mt-5">
		<h1 class="h3 mb-4 text-center">SFAシステム ホーム</h1>

		<div class="row g-4 justify-content-center">
			<!-- 生徒管理 -->
			<div class="col-md-3">
				<div class="card text-center shadow h-100">
					<div class="card-body d-flex flex-column justify-content-center p-4">
						<h5 class="card-title">生徒管理</h5>
						<p class="card-text text-muted">生徒情報の登録・編集・削除</p>
						<a href="/students" class="btn btn-primary mt-2">管理画面へ</a>
					</div>
				</div>
			</div>

			<!-- カリキュラム管理 -->
			<div class="col-md-3">
				<div class="card text-center shadow h-100">
					<div class="card-body d-flex flex-column justify-content-center p-4">
						<h5 class="card-title">カリキュラム管理</h5>
						<p class="card-text text-muted">カリキュラム情報の登録・編集・削除</p>
						<a href="/curriculums" class="btn btn-primary mt-2">管理画面へ</a>
					</div>
				</div>
			</div>

			<!-- 現場管理 -->
			<div class="col-md-3">
				<div class="card text-center shadow h-100">
					<div class="card-body d-flex flex-column justify-content-center p-4">
						<h5 class="card-title">現場管理</h5>
						<p class="card-text text-muted">現場情報の登録・編集・削除</p>
						<a href="/fields" class="btn btn-primary mt-2">管理画面へ</a>
					</div>
				</div>
			</div>

			<!-- 配属管理 -->
			<div class="col-md-3">
				<div class="card text-center shadow h-100">
					<div class="card-body d-flex flex-column justify-content-center p-4">
						<h5 class="card-title">配属管理</h5>
						<p class="card-text text-muted">配属情報の登録・編集・削除</p>
						<a href="/assignments" class="btn btn-primary mt-2">管理画面へ</a>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
	</script>
</body>
</html>
