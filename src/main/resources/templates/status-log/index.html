<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>状況ログ一覧</title>
	<link rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
	<!-- ナビゲーションバー -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand" href="/home">SFAシステム</a>
			<div class="navbar-nav ms-auto">
				<a class="nav-link text-white" href="/students">生徒管理</a>
				<a class="nav-link text-white" href="/curriculums">カリキュラム管理</a>
				<a class="nav-link text-white" href="/fields">現場管理</a>
				<a class="nav-link text-white" href="/assignments">配属管理</a>
				<a class="nav-link text-white" href="/curriculum-progresses">進捗管理</a>
				<a class="nav-link text-white" href="/status-logs">状況ログ</a>
				<form th:action="@{/logout}" method="post" class="ms-2">
					<button type="submit" class="btn btn-outline-light btn-sm">
						ログアウト
					</button>
				</form>
			</div>
		</div>
	</nav>

	<div class="container mt-4">
		<div class="d-flex justify-content-between align-items-center mb-3">
			<h1 class="h3">状況ログ一覧</h1>
			<a href="/status-logs/new" class="btn btn-primary">新規登録</a>
		</div>

		<table class="table table-hover table-bordered">
			<thead class="table-dark">
				<tr>
					<th>生徒名</th>
					<th>現場名</th>
					<th>管理者</th>
					<th>稼働ステータス</th>
					<th>業務負荷</th>
					<th>評価</th>
					<th>記録日時</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="statusLog : ${statusLogs}">
					<td th:text="${statusLog.student.lastName + ' ' + statusLog.student.firstName}"></td>
					<td th:text="${statusLog.field.name}"></td>
					<td th:text="${statusLog.admin.username}"></td>
					<td>
						<span th:switch="${statusLog.status}">
							<span th:case="1" class="badge bg-success">稼働中</span>
							<span th:case="2" class="badge bg-secondary">待機</span>
						</span>
					</td>
					<td>
						<span th:switch="${statusLog.workloadLevel}">
							<span th:case="1" class="badge bg-success">低</span>
							<span th:case="2" class="badge bg-warning">中</span>
							<span th:case="3" class="badge bg-danger">高</span>
						</span>
					</td>
					<td th:text="${statusLog.performanceEvaluation}"></td>
					<td th:text="${statusLog.recordedAt}"></td>
					<td>
						<a th:href="@{/status-logs/{id}/edit(id=${statusLog.id})}"
							class="btn btn-sm btn-warning">編集</a>
						<form th:action="@{/status-logs/{id}/delete(id=${statusLog.id})}"
							method="post" class="d-inline">
							<button type="submit" class="btn btn-sm btn-danger"
								onclick="return confirm('削除しますか？')">削除</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
	</script>
</body>
</html>
