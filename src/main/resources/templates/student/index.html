<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>生徒一覧</title>
	<link rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
	<!-- ナビゲーションバー -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand" href="/students">SFAシステム</a>
			<div class="navbar-nav ms-auto">
				<form th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-outline-light btn-sm">
						ログアウト
					</button>
				</form>
			</div>
		</div>
	</nav>

	<div class="container mt-4">
		<div class="d-flex justify-content-between align-items-center mb-3">
			<h1 class="h3">生徒一覧</h1>
			<a href="/students/new" class="btn btn-primary">新規登録</a>
		</div>

		<table class="table table-hover table-bordered">
			<thead class="table-dark">
				<tr>
					<th>生徒コード</th>
					<th>氏名</th>
					<th>メールアドレス</th>
					<th>入校日</th>
					<th>ステータス</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="student : ${students}">
					<td th:text="${student.studentCode}"></td>
					<td th:text="${student.lastName + ' ' + student.firstName}"></td>
					<td th:text="${student.email}"></td>
					<td th:text="${student.entryDate}"></td>
					<td>
						<span th:switch="${student.status}">
							<span th:case="1" class="badge bg-success">在籍中</span>
							<span th:case="2" class="badge bg-warning">休学</span>
							<span th:case="3" class="badge bg-secondary">修了</span>
							<span th:case="4" class="badge bg-danger">中断</span>
						</span>
					</td>
					<td>
						<a th:href="@{/students/{id}/edit(id=${student.id})}"
							class="btn btn-sm btn-warning">編集</a>
						<form th:action="@{/students/{id}/delete(id=${student.id})}"
							method="post" class="d-inline">
							<button type="submit" class="btn btn-sm btn-danger"
								onclick="return confirm('削除しますか？')">削除</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
	</script>
</body>
</html>
