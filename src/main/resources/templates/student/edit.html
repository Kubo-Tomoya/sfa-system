<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>生徒情報編集</title>
	<link rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
	<!-- ナビゲーションバー -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand" href="/students">SFAシステム</a>
			<div class="navbar-nav ms-auto">
				<form th:action="@{/logout}" method="post">
					<button type="submit" class="btn btn-outline-light btn-sm">
						ログアウト
					</button>
				</form>
			</div>
		</div>
	</nav>

	<div class="container mt-4">
		<h1 class="h3 mb-4">生徒情報編集</h1>

		<form th:action="@{/students/{id}/update(id=${id})}"
			th:object="${studentForm}" method="post">
			<div class="row">
				<!-- 生徒コード -->
				<div class="col-md-6 mb-3">
					<label class="form-label">生徒コード <span class="text-danger">*</span></label>
					<input type="text" th:field="*{studentCode}" class="form-control"
						th:classappend="${#fields.hasErrors('studentCode')} ? 'is-invalid'">
					<div class="invalid-feedback" th:errors="*{studentCode}"></div>
				</div>

				<!-- 在籍ステータス -->
				<div class="col-md-6 mb-3">
					<label class="form-label">在籍ステータス <span class="text-danger">*</span></label>
					<select th:field="*{status}" class="form-select"
						th:classappend="${#fields.hasErrors('status')} ? 'is-invalid'">
						<option value="">選択してください</option>
						<option value="1">在籍中</option>
						<option value="2">休学</option>
						<option value="3">修了</option>
						<option value="4">中断</option>
					</select>
					<div class="invalid-feedback" th:errors="*{status}"></div>
				</div>

				<!-- 姓 -->
				<div class="col-md-3 mb-3">
					<label class="form-label">姓 <span class="text-danger">*</span></label>
					<input type="text" th:field="*{lastName}" class="form-control"
						th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'">
					<div class="invalid-feedback" th:errors="*{lastName}"></div>
				</div>

				<!-- 名 -->
				<div class="col-md-3 mb-3">
					<label class="form-label">名 <span class="text-danger">*</span></label>
					<input type="text" th:field="*{firstName}" class="form-control"
						th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'">
					<div class="invalid-feedback" th:errors="*{firstName}"></div>
				</div>

				<!-- 姓（カナ） -->
				<div class="col-md-3 mb-3">
					<label class="form-label">姓（カナ）</label>
					<input type="text" th:field="*{lastNameKana}" class="form-control"
						th:classappend="${#fields.hasErrors('lastNameKana')} ? 'is-invalid'">
					<div class="invalid-feedback" th:errors="*{lastNameKana}"></div>
				</div>

				<!-- 名（カナ） -->
				<div class="col-md-3 mb-3">
					<label class="form-label">名（カナ）</label>
					<input type="text" th:field="*{firstNameKana}" class="form-control"
						th:classappend="${#fields.hasErrors('firstNameKana')} ? 'is-invalid'">
					<div class="invalid-feedback" th:errors="*{firstNameKana}"></div>
				</div>

				<!-- メールアドレス -->
				<div class="col-md-6 mb-3">
					<label class="form-label">メールアドレス <span class="text-danger">*</span></label>
					<input type="email" th:field="*{email}" class="form-control"
						th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
					<div class="invalid-feedback" th:errors="*{email}"></div>
				</div>

				<!-- 電話番号 -->
				<div class="col-md-6 mb-3">
					<label class="form-label">電話番号</label>
					<input type="text" th:field="*{phoneNumber}" class="form-control"
						th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid'">
					<div class="invalid-feedback" th:errors="*{phoneNumber}"></div>
				</div>

				<!-- 性別 -->
				<div class="col-md-3 mb-3">
					<label class="form-label">性別</label>
					<select th:field="*{gender}" class="form-select">
						<option value="">選択してください</option>
						<option value="M">男性</option>
						<option value="F">女性</option>
						<option value="O">その他</option>
					</select>
				</div>

				<!-- 生年月日 -->
				<div class="col-md-3 mb-3">
					<label class="form-label">生年月日</label>
					<input type="date" th:field="*{birthDate}" class="form-control">
				</div>

				<!-- 入校日 -->
				<div class="col-md-3 mb-3">
					<label class="form-label">入校日 <span class="text-danger">*</span></label>
					<input type="date" th:field="*{entryDate}" class="form-control"
						th:classappend="${#fields.hasErrors('entryDate')} ? 'is-invalid'">
					<div class="invalid-feedback" th:errors="*{entryDate}"></div>
				</div>

				<!-- 修了予定日 -->
				<div class="col-md-3 mb-3">
					<label class="form-label">修了予定日</label>
					<input type="date" th:field="*{expectedGraduationDate}" class="form-control">
				</div>

				<!-- 最終学歴 -->
				<div class="col-md-6 mb-3">
					<label class="form-label">最終学歴</label>
					<input type="text" th:field="*{educationLevel}" class="form-control">
				</div>

				<!-- 実務経験年数 -->
				<div class="col-md-6 mb-3">
					<label class="form-label">実務経験年数</label>
					<input type="number" th:field="*{experienceYears}" class="form-control">
				</div>

				<!-- 備考 -->
				<div class="col-md-12 mb-3">
					<label class="form-label">備考</label>
					<textarea th:field="*{note}" class="form-control" rows="3"></textarea>
				</div>
			</div>

			<div class="d-flex gap-2">
				<button type="submit" class="btn btn-primary">更新</button>
				<a href="/students" class="btn btn-secondary">戻る</a>
			</div>
		</form>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
	</script>
</body>
</html>
