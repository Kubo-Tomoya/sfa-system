<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>カリキュラム進捗一覧</title>
	<link rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
	<!-- ナビゲーションバー -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand" href="/home">SFAシステム</a>
			<div class="navbar-nav ms-auto">
				<a class="nav-link text-white" href="/students">生徒管理</a>
				<a class="nav-link text-white" href="/curriculums">カリキュラム管理</a>
				<a class="nav-link text-white" href="/fields">現場管理</a>
				<a class="nav-link text-white" href="/assignments">配属管理</a>
				<a class="nav-link text-white" href="/curriculum-progresses">進捗管理</a>
				<form th:action="@{/logout}" method="post" class="ms-2">
					<button type="submit" class="btn btn-outline-light btn-sm">
						ログアウト
					</button>
				</form>
			</div>
		</div>
	</nav>

	<div class="container mt-4">
		<div class="d-flex justify-content-between align-items-center mb-3">
			<h1 class="h3">カリキュラム進捗一覧</h1>
			<a href="/curriculum-progresses/new" class="btn btn-primary">新規登録</a>
		</div>

		<table class="table table-hover table-bordered">
			<thead class="table-dark">
				<tr>
					<th>生徒名</th>
					<th>カリキュラム名</th>
					<th>開始日</th>
					<th>現在ステップ</th>
					<th>進捗ステータス</th>
					<th>完了日</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="progress : ${progresses}">
					<td th:text="${progress.student.lastName + ' ' + progress.student.firstName}"></td>
					<td th:text="${progress.curriculum.name}"></td>
					<td th:text="${progress.startDate}"></td>
					<td th:text="${progress.currentStep}"></td>
					<td>
						<span th:switch="${progress.status}">
							<span th:case="1" class="badge bg-secondary">未着手</span>
							<span th:case="2" class="badge bg-primary">進行中</span>
							<span th:case="3" class="badge bg-warning">停滞</span>
							<span th:case="4" class="badge bg-success">完了</span>
						</span>
					</td>
					<td th:text="${progress.completionDate}"></td>
					<td>
						<a th:href="@{/curriculum-progresses/{id}/edit(id=${progress.id})}"
							class="btn btn-sm btn-warning">編集</a>
						<form
							th:action="@{/curriculum-progresses/{id}/delete(id=${progress.id})}"
							method="post" class="d-inline">
							<button type="submit" class="btn btn-sm btn-danger"
								onclick="return confirm('削除しますか？')">削除</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
	</script>
</body>
</html>
