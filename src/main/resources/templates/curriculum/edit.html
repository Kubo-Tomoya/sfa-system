<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>カリキュラム編集</title>
	<link rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
	<!-- ナビゲーションバー -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand" href="/students">SFAシステム</a>
			<div class="navbar-nav ms-auto">
				<a class="nav-link text-white" href="/students">生徒管理</a>
				<a class="nav-link text-white" href="/curriculums">カリキュラム管理</a>
				<form th:action="@{/logout}" method="post" class="ms-2">
					<button type="submit" class="btn btn-outline-light btn-sm">
						ログアウト
					</button>
				</form>
			</div>
		</div>
	</nav>

	<div class="container mt-4">
		<h1 class="h3 mb-4">カリキュラム編集</h1>

		<form th:action="@{/curriculums/{id}/update(id=${id})}"
			th:object="${curriculumForm}" method="post">
			<div class="row">
				<!-- カリキュラムコード -->
				<div class="col-md-6 mb-3">
					<label class="form-label">カリキュラムコード <span
						class="text-danger">*</span></label>
					<input type="text" th:field="*{curriculumCode}" class="form-control"
						th:classappend="${#fields.hasErrors('curriculumCode')} ? 'is-invalid'">
					<div class="invalid-feedback" th:errors="*{curriculumCode}"></div>
				</div>

				<!-- カリキュラム名 -->
				<div class="col-md-6 mb-3">
					<label class="form-label">カリキュラム名 <span
						class="text-danger">*</span></label>
					<input type="text" th:field="*{name}" class="form-control"
						th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
					<div class="invalid-feedback" th:errors="*{name}"></div>
				</div>

				<!-- カテゴリ -->
				<div class="col-md-6 mb-3">
					<label class="form-label">カテゴリ</label>
					<input type="text" th:field="*{category}" class="form-control"
						th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'">
					<div class="invalid-feedback" th:errors="*{category}"></div>
				</div>

				<!-- 難易度 -->
				<div class="col-md-6 mb-3">
					<label class="form-label">難易度</label>
					<select th:field="*{difficultyLevel}" class="form-select">
						<option value="">選択してください</option>
						<option value="1">初級</option>
						<option value="2">中級</option>
						<option value="3">上級</option>
					</select>
				</div>

				<!-- 想定学習時間 -->
				<div class="col-md-6 mb-3">
					<label class="form-label">想定学習時間（時間）</label>
					<input type="number" th:field="*{estimatedHours}"
						class="form-control">
				</div>

				<!-- バージョン -->
				<div class="col-md-6 mb-3">
					<label class="form-label">バージョン</label>
					<input type="text" th:field="*{version}" class="form-control"
						th:classappend="${#fields.hasErrors('version')} ? 'is-invalid'">
					<div class="invalid-feedback" th:errors="*{version}"></div>
				</div>

				<!-- 有効フラグ -->
				<div class="col-md-6 mb-3">
					<label class="form-label">有効フラグ <span
						class="text-danger">*</span></label>
					<select th:field="*{isActive}" class="form-select"
						th:classappend="${#fields.hasErrors('isActive')} ? 'is-invalid'">
						<option value="">選択してください</option>
						<option value="true">有効</option>
						<option value="false">無効</option>
					</select>
					<div class="invalid-feedback" th:errors="*{isActive}"></div>
				</div>

				<!-- 説明 -->
				<div class="col-md-12 mb-3">
					<label class="form-label">説明</label>
					<textarea th:field="*{description}" class="form-control"
						rows="3"></textarea>
				</div>
			</div>

			<div class="d-flex gap-2">
				<button type="submit" class="btn btn-primary">更新</button>
				<a href="/curriculums" class="btn btn-secondary">戻る</a>
			</div>
		</form>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
	</script>
</body>
</html>
