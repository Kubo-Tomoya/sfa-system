<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>カリキュラム一覧</title>
	<link rel="stylesheet"
		href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
	<!-- ナビゲーションバー -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand" href="/students">SFAシステム</a>
			<div class="navbar-nav ms-auto">
				<a class="nav-link text-white" href="/students">生徒管理</a>
				<a class="nav-link text-white" href="/curriculums">カリキュラム管理</a>
				<form th:action="@{/logout}" method="post" class="ms-2">
					<button type="submit" class="btn btn-outline-light btn-sm">
						ログアウト
					</button>
				</form>
			</div>
		</div>
	</nav>

	<div class="container mt-4">
		<div class="d-flex justify-content-between align-items-center mb-3">
			<h1 class="h3">カリキュラム一覧</h1>
			<a href="/curriculums/new" class="btn btn-primary">新規登録</a>
		</div>

		<table class="table table-hover table-bordered">
			<thead class="table-dark">
				<tr>
					<th>カリキュラムコード</th>
					<th>カリキュラム名</th>
					<th>カテゴリ</th>
					<th>難易度</th>
					<th>想定学習時間</th>
					<th>有効フラグ</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="curriculum : ${curriculums}">
					<td th:text="${curriculum.curriculumCode}"></td>
					<td th:text="${curriculum.name}"></td>
					<td th:text="${curriculum.category}"></td>
					<td>
						<span th:switch="${curriculum.difficultyLevel}">
							<span th:case="1" class="badge bg-success">初級</span>
							<span th:case="2" class="badge bg-warning">中級</span>
							<span th:case="3" class="badge bg-danger">上級</span>
						</span>
					</td>
					<td th:text="${curriculum.estimatedHours + '時間'}"></td>
					<td>
						<span th:if="${curriculum.isActive}"
							class="badge bg-success">有効</span>
						<span th:unless="${curriculum.isActive}"
							class="badge bg-secondary">無効</span>
					</td>
					<td>
						<a th:href="@{/curriculums/{id}/edit(id=${curriculum.id})}"
							class="btn btn-sm btn-warning">編集</a>
						<form th:action="@{/curriculums/{id}/delete(id=${curriculum.id})}"
							method="post" class="d-inline">
							<button type="submit" class="btn btn-sm btn-danger"
								onclick="return confirm('削除しますか？')">削除</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
	</script>
</body>
</html>
