services:
  mysql:
    image: mysql:8.0
    container_name: mysql_container_sfa
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sfa_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_sfa_data:/var/lib/mysql

volumes:
  mysql_sfa_data: